<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokéNemesis - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>⚔️ POKÉNEMESIS ⚔️</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required><br><br>
            <input type="password" id="password" placeholder="Password" required><br><br>
            <button type="submit">LOGIN</button>
        </form>
        <p style="margin-top: 20px;">New trainer? <a href="/register">Register here</a></p>
        <div id="message" style="color: #ff8888; margin-top: 10px;"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('message').innerText = data.error || 'Login failed';
            }
        });
    </script>
</body>
</html>
